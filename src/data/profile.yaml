name: Xingdong Zuo
avatar: /avatar.jpg

bio:
  - >-
    I am a machine learning research engineer at
    <a href="https://www.navercorp.com/en">NAVER</a>, where I apply
    <strong>reinforcement learning</strong> to large-scale, real-world
    decision making — <strong>recommender systems</strong> and
    <strong>auto-bidding</strong> in online advertising auctions.
  - >-
    My research interests include <strong>offline RL</strong> for recommender
    systems and auto-bidding, and robot learning with
    <strong>vision-language-action (VLA) models</strong> and
    <strong>world action models</strong>.
  - >-
    Before NAVER, I completed my M.Sc. in Machine Learning at the University
    of Freiburg, Germany, and my B.Sc. in Applied Mathematics and Computer
    Science at Linnaeus University, Sweden.

